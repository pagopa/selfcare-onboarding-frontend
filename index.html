<!doctype html>
<html lang="it">
  <head>
    <base href="/onboarding/" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />

    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="pragma" content="no-cache" />

    <title>PagoPA Piattaforma Self Care – Onboarding</title>
    <meta
      name="description"
      content="Modulo di Onboarding per la piattaforma Self Care di PagoPA"
    />

    <meta name="theme-color" content="#00a1b0" />
    <link rel="manifest" href="manifest.webmanifest" crossorigin="anonymous" />
    <link rel="icon" href="favicon-32x32.png" type="image/png" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-48x48.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-96x96.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-256x256.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-384x384.png" />
    <link rel="apple-touch-icon" sizes="48x48" href="icons/icon-512x512.png" />

    <link href="<%- VITE_URL_CDN %>/assets/font/selfhostedfonts.css" rel="stylesheet" />

    <script
      src="<%- VITE_ONE_TRUST_BASE_URL %>/scripttemplates/otSDKStub.js"
      type="text/javascript"
      charset="UTF-8"
      data-domain-script="<%- VITE_ONETRUST_DOMAIN_ID %>"
    ></script>
    <% if (VITE_QUALTRICS_ENABLE === 'true') { %>
    <!--BEGIN QUALTRICS WEBSITE FEEDBACK SNIPPET-->
    <script type="text/javascript">
      (function () {
        var g = function (g) {
          this.go = function () {
            var a = document.createElement('script');
            a.type = 'text/javascript';
            a.src = g;
            document.body && document.body.appendChild(a);
          };
          this.start = function () {
            var t = this;
            'complete' !== document.readyState
              ? window.addEventListener
                ? window.addEventListener(
                    'load',
                    function () {
                      t.go();
                    },
                    !1
                  )
                : window.attachEvent &&
                  window.attachEvent('onload', function () {
                    t.go();
                  })
              : t.go();
          };
        };
        try {
          new g('<%- VITE_QUALTRICS_SCRIPT_URL %>').start();
        } catch (i) {}
      })();
    </script>
    <div id="<%- VITE_QUALTRICS_SITE_ID %>"><!--DO NOT REMOVE-CONTENTS PLACED HERE--></div>
    <!--END QUALTRICS WEBSITE FEEDBACK SNIPPET-->
    <% } %>
  </head>
  <body style="margin: 0px">
    <noscript>Abilita JavaScript per utilizzare quest'applicazione</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
